<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EasyShop-Online Shopping</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body class="bg-gray-50 text-gray-800">


<header class="sticky top-0 z-50 bg-[#073a7a] text-white shadow-md">
  <div class="max-w-7xl mx-auto px-6 py-3 flex items-center justify-between">

    
    <div class="flex items-center gap-2">
      <i class="fa-solid fa-bag-shopping"></i>
      <h1 class="text-xl font-bold tracking-wide">EasyShop</h1>
    </div>

    
    <div class="flex items-center gap-5">

      
      <button id="cartBtn"
        class="relative bg-white text-[#073a7a] px-4 py-2 rounded-full font-medium hover:bg-gray-200 flex items-center gap-2">
        🛒
        <span id="cartCount" class="font-semibold">0</span>
      </button>

      
      <div class="relative">
        <button id="userBtn"
          class="bg-white text-[#073a7a] px-4 py-2 rounded-full font-medium hover:bg-gray-200">
          👤
        </button>

        
        <div id="dropdownMenu"
          class="hidden absolute left-1/2 transform -translate-x-1/2 mt-3 w-48 bg-white text-gray-700 rounded-xl shadow-lg overflow-hidden">

          <a href="#" class="block px-4 py-2 hover:bg-gray-100">My Profile</a>
          <!-- <a href="#cartBtn" class="block px-4 py-2 hover:bg-gray-100">Cart</a> -->
           <a href="#" onclick="toggleCart()" class="block px-4 py-2 hover:bg-gray-100">Cart</a>
          <!-- <a href="#" class="block px-4 py-2 hover:bg-gray-100">History</a> -->
          <a href="#" id="openHistory" class="block px-4 py-2 hover:bg-gray-100">History</a>
          <!-- <a href="#" class="block px-4 py-2 hover:bg-gray-100">Address</a> -->
           <a href="#" id="openAddress" class="block px-4 py-2 hover:bg-gray-100">Address</a>
          <!-- <a href="#" class="block px-4 py-2 hover:bg-gray-100">Settings</a> -->
          <a href="#" id="openSettings" class="block px-4 py-2 hover:bg-gray-100">Settings</a>
          <!-- <a href="#" class="block px-4 py-2 hover:bg-gray-100">Help</a> -->
          <a href="help.html" class="block px-4 py-2 hover:bg-gray-100">Help</a>

          <button id="logoutBtn"
            class="w-full text-left px-4 py-2 text-red-500 hover:bg-gray-100">
            Logout
          </button>
        </div>
      </div>

    </div>
  </div>
</header>




<section class="py-6 px-6 bg-white shadow-sm flex justify-between items-center">
  <div>
    <h2 class="text-xl text-gray-700">
      Welcome <span id="username" class="font-semibold text-[#073a7a]">{User}</span> 
    </h2>
    <p id="dateTime" class="text-sm text-gray-500"></p>
  </div>
</section>


<div class="sticky top-[70px] z-40 bg-white shadow-md py-4">

  <h2 class="text-center text-2xl font-bold text-[#073a7a] mb-4">
    🛍️ Shopping Zone
  </h2>

  <div class="max-w-6xl mx-auto px-4 flex flex-wrap gap-4 justify-center">

    
    <input id="searchInput" type="search"
      placeholder="Search products..."
      class="px-5 py-2 w-64 rounded-full border border-gray-300 focus:ring-2 focus:ring-[#073a7a] outline-none">

    
    <select id="categoryFilter"
      class="px-4 py-2 rounded-full border border-gray-300">
      <option value="all">All Categories</option>
      <option value="electronics">Electronics</option>
      <option value="fashion">Fashion</option>
      <option value="accessories">Accessories</option>
      <option value="homeappliances">Home Appliances</option>
      <option value="Women">Women</option>
      <option value="books">Book</option>
    </select>

    
    <select id="priceFilter"
      class="px-4 py-2 rounded-full border border-gray-300">
      <option value="all">All Prices</option>
      <option value="low">Below ₹100</option>
      <option value="low">₹100 - ₹500 </option>
      <option value="mid">₹500 - ₹1000</option>
      <option value="high">Above ₹1000 </option>
    </select>

  </div>
</div>


<div id="productContainer"
  class="max-w-6xl mx-auto px-4 mt-6 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
</div>


<div id="cartPopup" class="hidden fixed right-5 top-20 w-96 bg-white shadow-2xl rounded-xl p-4 z-50">
  <h2 class="text-lg font-bold mb-3">Your Cart 🛒</h2>

  <div id="cartItems" class="max-h-60 overflow-y-auto"></div>

  <div class="mt-3 font-bold text-right">
    Total: ₹<span id="totalPrice">0</span>
  </div>

  <button onclick="checkout()" 
    class="mt-3 w-full bg-[#073a7a] text-white py-2 rounded-lg">
    Checkout
  </button>
</div>

<!-- Profile Modal -->
<div id="profileModal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50">
  <div class="bg-white w-full max-w-md rounded-xl shadow-lg p-6 relative">

    <button id="closeProfile" class="absolute top-3 right-4 text-gray-500 text-xl">✖</button>

    <h2 class="text-xl font-bold text-[#073a7a] mb-4 text-center">My Profile</h2>

    <!-- Profile Image -->
    <div class="flex flex-col items-center mb-4">
      <img id="profilePreview" src="https://via.placeholder.com/100"
        class="w-24 h-24 rounded-full object-cover border mb-2">

      <input type="file" id="profileImage" accept="image/*" class="hidden">
      <button id="changeImageBtn"
        class="text-sm text-[#073a7a] font-medium hover:underline">Change Image</button>
    </div>

    <!-- FORM -->
    <div class="space-y-3">
      <input id="profileName" type="text"
        class="w-full border rounded px-3 py-2"
        placeholder="Full Name">

      <input id="profileEmail" type="email"
        class="w-full border rounded px-3 py-2 bg-gray-100"
        readonly>

      <input id="profileLocation" type="text"
        class="w-full border rounded px-3 py-2"
        placeholder="Location">

      <input id="profileContact" type="text"
        class="w-full border rounded px-3 py-2"
        placeholder="Contact Number" maxlength=10>
    </div>

    <button id="saveProfileBtn"
      class="mt-5 w-full bg-[#073a7a] text-white py-2 rounded-lg font-medium">
      Save Profile
    </button>

  </div>
</div>

<!-- history Modal -->
 <!-- Order History Modal -->
<div id="historyModal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50">
  <div class="bg-white w-full max-w-lg rounded-xl shadow-lg p-6 relative">

    <button id="closeHistory" class="absolute top-3 right-4 text-gray-500 text-xl">✖</button>

    <h2 class="text-xl font-bold text-[#073a7a] mb-4 text-center">Order History</h2>

    <div id="historyList" class="max-h-80 overflow-y-auto">
      <p class="text-center text-gray-500">Loading...</p>
    </div>

  </div>
</div>

<!-- Address Dropdown -->
 <!-- Address Modal -->
<div id="addressModal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50">
  <div class="bg-white w-full max-w-md rounded-xl shadow-lg p-6 relative">

    <button id="closeAddress" class="absolute top-3 right-4 text-gray-500 text-xl">✖</button>

    <h2 class="text-xl font-bold text-[#073a7a] mb-4 text-center">Delivery Address</h2>

    <!-- Form -->
    <div class="space-y-3">
      <input id="addrLine" type="text"
        class="w-full border rounded px-3 py-2"
        placeholder="Address">

      <input id="addrDist" type="text"
        class="w-full border rounded px-3 py-2"
        placeholder="District">

      <input id="addrState" type="text"
        class="w-full border rounded px-3 py-2"
        placeholder="State">

      <input id="addrPin" type="text"
        class="w-full border rounded px-3 py-2"
        placeholder="PIN Code" maxlength="6">
    </div>

    <button id="saveAddressBtn"
      class="mt-5 w-full bg-[#073a7a] text-white py-2 rounded-lg font-medium">
      Save Address
    </button>

    <!-- Saved Address Preview -->
    <div id="savedAddressBox" class="mt-4 hidden bg-gray-100 p-3 rounded text-sm">
      <b>Saved Address:</b>
      <p id="savedAddressText"></p>
    </div>

  </div>
</div>

<!-- Settings PopUp -->
<div id="settingsModal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50">
  <div class="bg-white w-full max-w-md rounded-xl shadow-lg p-6 relative">

    <button id="closeSettings" class="absolute top-3 right-4 text-gray-500 text-xl">✖</button>

    <h2 class="text-xl font-bold text-[#073a7a] mb-4 text-center">Settings</h2>

    <input id="newEmail" type="email" class="w-full border rounded px-3 py-2 mb-3" placeholder="New Email">

    <input id="newPassword" type="password" class="w-full border rounded px-3 py-2 mb-3" placeholder="New Password">

    <button id="saveSettingsBtn" class="mt-3 w-full bg-[#073a7a] text-white py-2 rounded-lg">
      Save Changes
    </button>

  </div>
</div>

<footer class="text-center py-6 bg-[#052c5c] text-gray-300 mt-10">
  © 2026 EasyShop | All Rights Reserved.
</footer>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script> 
<script src="shopping.js"></script>

</body>
</html>
